name: Build obsidian plugin

# Triggers when a release is published on GitHub (via the "Publish release"
# button, whether the tag already existed or was created in that same step).
# Previously triggered on "push: tags", which never actually fired for any
# release in this repo's history (verified: 0 runs ever recorded for any of
# push/release/create tag events) -- likely because tags created through the
# release-publish UI flow don't reliably produce the ref-push event that
# trigger depends on. "release: published" is the event GitHub guarantees
# fires when a release is published, regardless of how the tag was created.
on:
  release:
    types: [published]

# contents:write is needed to upload assets to the release; GITHUB_TOKEN
# defaults to read-only on newer repos. attestations:write and id-token:write
# are needed to sign build provenance attestations for the release assets
# (lets users verify main.js/manifest.json/styles.css were actually built
# from this repo by this workflow, not tampered with after the fact).
permissions:
  contents: write
  attestations: write
  id-token: write

env:
  PLUGIN_NAME: nldates-obsidian # Change this to the name of your plugin-id folder

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
      - name: Build
        run: |
          npm ci
          npm run build --if-present
          mkdir ${{ env.PLUGIN_NAME }}
          cp main.js manifest.json ${{ env.PLUGIN_NAME }}
          zip -r "${{ env.PLUGIN_NAME }}-${{ github.event.release.tag_name }}.zip" ${{ env.PLUGIN_NAME }}
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
            ${{ env.PLUGIN_NAME }}-${{ github.event.release.tag_name }}.zip
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=(main.js manifest.json "${{ env.PLUGIN_NAME }}-${{ github.event.release.tag_name }}.zip")
          # styles.css doesn't exist on every historical tag; only upload it
          # if the checked-out ref actually has one.
          if [ -f styles.css ]; then
            assets+=(styles.css)
          fi
          gh release upload "${{ github.event.release.tag_name }}" "${assets[@]}" --clobber
